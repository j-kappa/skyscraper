<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon_dark.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon_light.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
    <title>Skyscraper</title>
  </head>
  <body>
    <div id="landing">
      <div class="landing-content">
        <div class="landing-header">
          <h1 class="logo">skyscraper</h1>
          <p class="tagline">Render any website as a 3D cityscape</p>
        </div>
        <form id="url-form">
          <div class="input-group">
            <label for="url-input" class="input-label">URL</label>
            <div class="input-row">
              <span class="input-prefix">https://</span>
              <input
                type="text"
                id="url-input"
                placeholder="example.com"
                required
                autocomplete="url"
                spellcheck="false"
              />
              <button type="submit" id="go-btn">
                <span class="btn-text">Go</span>
                <svg class="btn-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12m0 0L8 2.5M13 7l-5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
            </div>
          </div>
          <p id="error-msg" class="error" hidden></p>
        </form>
        <footer class="landing-footer">
          <span class="footer-item">WebGL + Three.js</span>
          <span class="footer-sep">/</span>
          <span class="footer-item">Shadow mapping</span>
          <span class="footer-sep">/</span>
          <a href="https://github.com/j-kappa/skyscraper" target="_blank" rel="noopener" class="footer-link">GitHub</a>
        </footer>
        <p class="credit">Built by <a href="https://johnkappa.com" target="_blank" rel="noopener">johnkappa</a></p>
      </div>
    </div>

    <div id="scene-container" hidden>
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <button id="back-btn" title="Back to input">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 7H1m0 0l5-4.5M1 7l5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span id="url-label"></span>
      </div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Fetching site...</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
